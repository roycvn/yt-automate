# CHANNEL PROFILE — the single source of "what this channel is". Swap this whole
# block and yta produces for ANY niche (horror, cooking, motivation, tech...).
# Drives script generation, art style, voice, thumbnail concept, SEO, outro.
channel:
  name: TheStoryBoardz
  language: hi                       # ISO code -> Sarvam voice + captions
  language_name: "Hindi (Devanagari)"
  niche: "Original Hindi animated horror stories — chudail/ghost/supernatural, an ordinary object or place that turns sinister, with a chilling twist ending"
  tone: "suspenseful, dread-building, eerie, chilling"
  audience: "Hindi-speaking horror & scary-story fans"
  format: "narrated animated horror story with a strong everyday hook and a shocking twist"
  art_style: "2D animated horror cartoon, muted desaturated palette, volumetric moonlight, heavy shadows, cinematic, film grain"
  voice_speaker: anushka             # Sarvam speaker id
  scenes: 16
  outro_text: "TheStoryBoardz — सब्सक्राइब करें 🔔"
  title_suffix: " | TheStoryBoardz"

channels:
  hindi:
    youtube_channel_id: "UC_REPLACE_HINDI"
    watermark: assets/watermark/hindi.png
    language: hi
  telugu:
    youtube_channel_id: "UC_REPLACE_TELUGU"
    watermark: assets/watermark/telugu.png
    language: te

languages: [hi, te]

watermark:
  position: top-right      # top-left | top-right | bottom-left | bottom-right
  opacity: 0.6
  scale: 0.12              # fraction of video width

clip:
  count: 8
  max_duration_s: 60
  aspect: "9:16"
  burn_in_captions: true

dubbing:
  provider: elevenlabs     # elevenlabs | google
  preserve_timing: true

seo:
  model: claude-opus-4-7
  title_template: "{hook} _ {translit} _ Horror Stories _ Hindi Kahaniya _ Moral Stories"

publish:
  uploads_per_day_per_channel: 6
  cadence_hours: 8
  initial_privacy: private   # uploaded private with publishAt for scheduling

klipr:
  base_url: "https://klipr.in/api/batch"   # real klipr batch API (github.com/roycvn/yts)
  # API key comes from the KLIPR_API_KEY env var (see .env.example). Mint with
  # klipr's scripts/mint-api-key.ts.

storage:
  artifacts_dir: ./artifacts
  db_path: ./yta.db

# Brand logo overlays burned onto every finished video. Paths relative to repo
# root; positions: top-left/top-right/top-center/mid-left/mid-right/
# bottom-left/bottom-right/bottom-center. scale = fraction of video width.
branding:
  logos:
    - path: assets/logos/klipr.png            # "Made with Klipr"
      position: top-right
      scale: 0.12
      opacity: 0.9
    - path: assets/logo_trans_white_letter.png  # TheStoryBoardz
      position: bottom-right
      scale: 0.16
      opacity: 0.95

thumbnail:
  # Big two-tone brush-style title + red banner subtitle (reference look).
  banner_text: "BASED ON A TRUE STORY"
  subject: "terrified young woman, hand over mouth, tears, wide eyes"
  title_color: "&H00FFFFFF"   # white (ASS BGR)
  accent_color: "&H000000FF"  # red
